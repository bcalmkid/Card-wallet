<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, maximum-scale=1.0, user-scalable=no">
    <title>Card Wallet - Vercel KV 版</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; max-width: 500px; margin: 0 auto; }
        input, select, button { padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #ccc; width: 100%; box-sizing: border-box; font-size: 16px; background: white; }
        .primary { background: #000; color: #fff; border: none; font-weight: bold; }
        .secondary { background: #f0f0f0; }
        .card-item { background: #f9f9f9; padding: 15px; margin-top: 10px; border-radius: 8px; border: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        .render-btn { width: auto; background: #007aff; color: white; border: none; padding: 8px 15px; }
        #barcode-container { text-align: center; margin: 20px 0; display: none; }
        .auth-box { background: #eef2f7; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="auth-box">
        <input type="password" id="appPassword" placeholder="输入访问密码" autocomplete="current-password" />
        <button class="primary" onclick="loadCardsFromServer()">🔐 验证并同步云端数据</button>
    </div>

    <h2>添加新卡片</h2>
    <input type="text" id="cardName" placeholder="例如: T&T Supermarket" />
    <input type="number" id="cardNumber" placeholder="例如: 41012345678" />
    <select id="cardFormat">
        <option value="UPC">UPC-A (需 11/12 位数字)</option>
        <option value="CODE128">Code 128 (通用)</option>
        <option value="EAN13">EAN 13 (需 12/13 位数字)</option>
    </select>
    <button class="primary" onclick="addCard()">保存并同步到 Vercel</button>

    <div id="barcode-container">
        <h3 id="display-name"></h3>
        <svg id="barcode-canvas"></svg>
    </div>

    <hr>
    <h2>我的卡包</h2>
    <div id="card-list"></div>

    <script>
        let localCards = [];

        window.onload = function() {
            const savedPassword = localStorage.getItem('wallet_pwd');
            if (savedPassword) {
                document.getElementById('appPassword').value = savedPassword;
                loadCardsFromServer();
            }
        };

        function getPassword() {
            return document.getElementById('appPassword').value.trim();
        }

        async function loadCardsFromServer() {
            const password = getPassword();
            if (!password) return alert('请输入密码');

            try {
                const res = await fetch('/api/get-cards', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                const data = await res.json();
                if (res.ok) {
                    localCards = data.cards;
                    localStorage.setItem('wallet_pwd', password);
                    updateCardList();
                } else {
                    alert(data.error || '同步失败');
                }
            } catch (e) { alert('网络错误: ' + e.message); }
        }

        async function addCard() {
            const password = getPassword();
            const name = document.getElementById('cardName').value.trim();
            const number = document.getElementById('cardNumber').value.trim();
            const format = document.getElementById('cardFormat').value;

            if (!password) return alert('请先输入密码验证状态');
            if (!name || !number) return alert('请完整填写卡片信息');

            localCards.push({ name, number, format });
            updateCardList();
            renderBarcode(name, number, format);

            document.getElementById('cardName').value = '';
            document.getElementById('cardNumber').value = '';

            try {
                const res = await fetch('/api/save-cards', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password, cards: localCards })
                });
                if (!res.ok) alert('保存到云端失败，请检查密码');
            } catch (e) { alert('云端同步失败: ' + e.message); }
        }

        function updateCardList() {
            const listDiv = document.getElementById('card-list');
            listDiv.innerHTML = localCards.length === 0 ? '<p style="color: #999;">暂无卡片，请先输入密码同步</p>' : '';
            localCards.forEach((card) => {
                const item = document.createElement('div');
                item.className = 'card-item';
                item.innerHTML =
                    '<div><strong>' + card.name + '</strong><br><small>' + card.number + ' (' + card.format + ')</small></div>' +
                    '<button class="render-btn" onclick="renderBarcode(\'' + card.name + '\', \'' + card.number + '\', \'' + card.format + '\')">显示</button>';
                listDiv.appendChild(item);
            });
        }

        function renderBarcode(name, number, format) {
            const container = document.getElementById('barcode-container');
            document.getElementById('display-name').textContent = name;
            container.style.display = 'block';
            try {
                JsBarcode("#barcode-canvas", number, { format: format, lineColor: "#000", width: 2.5, height: 100, displayValue: true });
            } catch (e) { alert('条码渲染失败，请检查卡号与格式是否匹配'); }
        }
    </script>
</body>
</html>
