<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, maximum-scale=1.0, user-scalable=no">
    <title>Card Wallet</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f2f2f7;
            min-height: 100vh;
            padding-bottom: 60px;
        }

        /* ── Header ── */
        header {
            background: #fff;
            border-bottom: 1px solid #e5e5ea;
            padding: 14px 20px;
            position: sticky; top: 0; z-index: 10;
            display: flex; align-items: center; justify-content: space-between;
        }
        header h1 { font-size: 22px; font-weight: 700; }

        #sync-pill {
            display: inline-flex; align-items: center; gap: 5px;
            font-size: 12px; font-weight: 500;
            padding: 5px 12px; border-radius: 20px;
            transition: background .3s, color .3s;
            cursor: pointer; border: none; background: none;
        }
        #sync-pill.idle    { background: #e5e5ea; color: #636366; }
        #sync-pill.syncing { background: #e5e5ea; color: #636366; }
        #sync-pill.ok      { background: #d1f5e0; color: #1c8a3f; }
        #sync-pill.error   { background: #ffe5e5; color: #c0392b; }

        .spinner {
            width: 10px; height: 10px;
            border: 2px solid currentColor; border-top-color: transparent;
            border-radius: 50%; animation: spin .7s linear infinite; display: none;
        }
        #sync-pill.syncing .spinner { display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Toast ── */
        #toast {
            position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
            background: rgba(28,28,30,.92); color: #fff;
            padding: 11px 20px; border-radius: 22px;
            font-size: 14px; font-weight: 500;
            opacity: 0; transition: opacity .2s;
            pointer-events: none; white-space: nowrap; z-index: 300;
        }
        #toast.show { opacity: 1; }

        /* ── Action sheet (delete confirm) ── */
        #action-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,.4); z-index: 200;
            align-items: flex-end; justify-content: center;
        }
        #action-overlay.show { display: flex; }
        .action-sheet {
            background: #f2f2f7; border-radius: 16px 16px 0 0;
            width: 100%; max-width: 500px;
            padding: 0 16px 32px;
            animation: slideUp .25s ease;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .action-sheet-handle {
            width: 36px; height: 4px; background: #c7c7cc;
            border-radius: 2px; margin: 10px auto 16px;
        }
        .action-sheet-title {
            text-align: center; font-size: 13px; color: #8e8e93;
            margin-bottom: 12px; padding: 0 8px;
        }
        .action-btn {
            display: block; width: 100%; padding: 15px;
            border: none; border-radius: 12px; font-size: 17px;
            cursor: pointer; margin-bottom: 8px; font-weight: 500;
        }
        .action-btn.danger  { background: #fff; color: #ff3b30; }
        .action-btn.cancel  { background: #fff; color: #007aff; font-weight: 600; }

        /* ── Undo banner ── */
        #undo-banner {
            display: none; margin: 12px 16px 0;
            background: #fff3cd; border: 1px solid #ffe5a0;
            padding: 12px 14px; border-radius: 12px;
            align-items: center; gap: 10px;
        }
        #undo-banner.show { display: flex; }
        .undo-bar { flex: 1; }
        .undo-bar strong { display: block; font-size: 14px; color: #856404; }
        .undo-bar small { font-size: 12px; color: #a07830; }
        .btn-undo {
            padding: 8px 16px; border-radius: 8px; border: none;
            background: #ffc107; color: #333;
            font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap;
        }

        /* ── Section ── */
        .section {
            background: #fff; border-radius: 12px;
            margin: 16px 16px 0; overflow: hidden;
            box-shadow: 0 1px 2px rgba(0,0,0,.05);
        }
        .section-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 16px 6px;
        }
        .section-title {
            font-size: 12px; font-weight: 600; color: #8e8e93;
            text-transform: uppercase; letter-spacing: .4px;
        }

        /* ── Card list ── */
        .card-item {
            display: flex; align-items: center;
            padding: 13px 16px; gap: 12px;
        }
        .card-item + .card-item { border-top: 1px solid #f2f2f7; }
        .card-icon {
            width: 38px; height: 38px; border-radius: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; font-size: 16px;
        }
        .card-info { flex: 1; min-width: 0; }
        .card-info strong { font-size: 15px; color: #1c1c1e; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-info small { font-size: 12px; color: #8e8e93; margin-top: 1px; display: block; }
        .card-actions { display: flex; gap: 6px; flex-shrink: 0; }
        .btn-show {
            padding: 7px 14px; border-radius: 8px;
            background: #007aff; color: #fff;
            border: none; font-size: 13px; font-weight: 600; cursor: pointer;
        }
        .btn-delete {
            width: 32px; height: 32px; border-radius: 8px;
            background: #f2f2f7; color: #c0392b;
            border: none; font-size: 14px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-show:active, .btn-delete:active { opacity: .7; }
        .empty-state { padding: 28px 16px; text-align: center; color: #8e8e93; font-size: 15px; }

        /* ── Add card ── */
        .btn-add-main {
            display: block; width: calc(100% - 32px);
            margin: 16px; padding: 14px;
            background: #1c1c1e; color: #fff;
            border: none; border-radius: 12px;
            font-size: 16px; font-weight: 600; cursor: pointer;
            transition: opacity .15s;
        }
        .btn-add-main:active { opacity: .75; }

        #add-form { display: none; border-top: 1px solid #f2f2f7; }
        #add-form.show { display: block; }
        .form-row {
            display: flex; align-items: center;
            padding: 0 16px; border-bottom: 1px solid #f2f2f7;
        }
        .form-row label { font-size: 13px; color: #8e8e93; width: 54px; flex-shrink: 0; }
        .form-row input, .form-row select {
            flex: 1; padding: 13px 0 13px 8px;
            border: none; font-size: 16px; background: transparent;
            outline: none; color: #1c1c1e; -webkit-appearance: none;
        }
        .form-actions { display: flex; gap: 8px; padding: 12px 16px 16px; }
        .btn-save {
            flex: 1; padding: 12px;
            background: #007aff; color: #fff;
            border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer;
        }
        .btn-cancel-form {
            flex: 1; padding: 12px;
            background: #f2f2f7; color: #1c1c1e;
            border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer;
        }

        /* ── Barcode panel ── */
        #barcode-section { display: none; }
        #barcode-section.show { display: block; }
        .barcode-inner { padding: 20px 16px; text-align: center; border-top: 1px solid #f2f2f7; }
        #display-name { font-size: 16px; font-weight: 600; margin-bottom: 14px; color: #1c1c1e; }
        #barcode-canvas { max-width: 100%; }
        .barcode-btns { display: flex; gap: 8px; justify-content: center; margin-top: 14px; flex-wrap: wrap; }
        .btn-barcode {
            padding: 9px 16px; border-radius: 9px; border: none;
            font-size: 14px; font-weight: 500; cursor: pointer;
        }
        .btn-barcode.gray   { background: #f2f2f7; color: #636366; }
        .btn-barcode.yellow { background: #fff3cd; color: #856404; }
        .btn-barcode.green  { background: #d1f5e0; color: #1c8a3f; display: none; }

        /* ── Trash ── */
        #trash-section { display: none; }
        #trash-section.show { display: block; }
        .trash-item {
            display: flex; align-items: center;
            padding: 12px 16px; gap: 12px;
        }
        .trash-item + .trash-item { border-top: 1px solid #f2f2f7; }
        .trash-icon {
            width: 34px; height: 34px; border-radius: 9px;
            background: #f2f2f7; color: #8e8e93;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .trash-info { flex: 1; min-width: 0; }
        .trash-info strong { font-size: 14px; color: #636366; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .trash-info small { font-size: 12px; color: #aeaeb2; }
        .btn-recover {
            padding: 7px 13px; border-radius: 8px;
            background: #d1f5e0; color: #1c8a3f;
            border: none; font-size: 13px; font-weight: 600; cursor: pointer; flex-shrink: 0;
        }
        .btn-clear-trash {
            padding: 5px 10px; border-radius: 6px; border: none;
            background: transparent; color: #ff3b30; font-size: 13px; cursor: pointer;
        }

        /* ── Cloud sync ── */
        .btn-sync-main {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            width: calc(100% - 32px); margin: 16px; padding: 14px;
            background: #f2f2f7; color: #1c1c1e;
            border: none; border-radius: 12px;
            font-size: 15px; font-weight: 600; cursor: pointer;
            transition: opacity .15s;
        }
        .btn-sync-main:active { opacity: .7; }
        .sync-status-dot {
            width: 8px; height: 8px; border-radius: 50%; background: #8e8e93; flex-shrink: 0;
        }
        .sync-status-dot.ok { background: #30d158; }
        .sync-status-dot.error { background: #ff3b30; }

        #sync-expand { display: none; border-top: 1px solid #f2f2f7; }
        #sync-expand.show { display: block; }
        .sync-expand-inner {
            display: flex; gap: 8px; padding: 12px 16px 16px;
        }
        .sync-expand-inner input {
            flex: 1; padding: 11px 14px;
            border: 1.5px solid #e5e5ea; border-radius: 10px;
            font-size: 15px; background: #f9f9fb; outline: none; color: #1c1c1e;
        }
        .sync-expand-inner input:focus { border-color: #007aff; }
        .btn-do-sync {
            padding: 11px 18px; border-radius: 10px;
            background: #007aff; color: #fff;
            border: none; font-size: 15px; font-weight: 600; cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <h1>我的卡包</h1>
    <button id="sync-pill" class="idle" onclick="onSyncPillTap()">
        <div class="spinner"></div>
        <span id="sync-text">未同步</span>
    </button>
</header>

<div id="toast"></div>

<!-- Action sheet (delete confirm) -->
<div id="action-overlay" onclick="cancelDelete(event)">
    <div class="action-sheet">
        <div class="action-sheet-handle"></div>
        <div class="action-sheet-title" id="action-title"></div>
        <button class="action-btn danger" onclick="confirmDelete()">删除</button>
        <button class="action-btn cancel" onclick="cancelDelete()">取消</button>
    </div>
</div>

<!-- Undo banner -->
<div id="undo-banner">
    <div class="undo-bar">
        <strong id="undo-title"></strong>
        <small id="undo-sub"></small>
    </div>
    <button class="btn-undo" id="btn-undo">撤销</button>
</div>

<!-- Card list -->
<div class="section">
    <div class="section-header">
        <span class="section-title" id="list-title">卡包</span>
    </div>
    <div id="card-list">
        <div class="empty-state">暂无卡片</div>
    </div>
</div>

<!-- Add card -->
<div class="section">
    <button class="btn-add-main" onclick="toggleAddForm()">+ 添加新卡片</button>
    <div id="add-form">
        <div class="form-row">
            <label>名称</label>
            <input type="text" id="cardName" placeholder="例如 T&T Supermarket" />
        </div>
        <div class="form-row">
            <label>卡号</label>
            <input type="number" id="cardNumber" placeholder="例如 41012345678" />
        </div>
        <div class="form-row">
            <label>格式</label>
            <select id="cardFormat">
                <option value="CODE128">Code 128（通用，推荐）</option>
                <option value="UPC">UPC-A（11/12 位）</option>
                <option value="EAN13">EAN-13（12/13 位）</option>
            </select>
        </div>
        <div class="form-actions">
            <button class="btn-save" onclick="addCard()">保存</button>
            <button class="btn-cancel-form" onclick="toggleAddForm()">取消</button>
        </div>
    </div>
</div>

<!-- Barcode display -->
<div class="section" id="barcode-section">
    <div class="section-header">
        <span class="section-title" id="display-name"></span>
        <button class="btn-barcode gray" style="padding:5px 10px;font-size:13px;" onclick="closeBarcode()">关闭</button>
    </div>
    <div class="barcode-inner">
        <svg id="barcode-canvas"></svg>
        <div class="barcode-btns">
            <button class="btn-barcode yellow" id="btn-bright-max"     onclick="setBrightMax()">☀️ 最亮</button>
            <button class="btn-barcode green"  id="btn-bright-restore" onclick="restoreBrightness()">↩ 恢复亮度</button>
        </div>
    </div>
</div>

<!-- Trash -->
<div class="section" id="trash-section">
    <div class="section-header">
        <span class="section-title">回收站</span>
        <button class="btn-clear-trash" onclick="clearTrash()">全部清除</button>
    </div>
    <div id="trash-list"></div>
</div>

<!-- Cloud sync -->
<div class="section">
    <button class="btn-sync-main" onclick="onSyncButtonTap()">
        <span class="sync-status-dot" id="sync-dot"></span>
        <span id="sync-btn-label">云端同步</span>
    </button>
    <div id="sync-expand">
        <div class="sync-expand-inner">
            <input type="password" id="appPassword" placeholder="访问密码" autocomplete="current-password" />
            <button class="btn-do-sync" onclick="doSync()">同步</button>
        </div>
    </div>
</div>

<script>
    const CACHE_KEY    = 'cw_cards_cache';
    const CACHE_TS_KEY = 'cw_cache_ts';
    const PWD_KEY      = 'wallet_pwd';
    const TRASH_KEY    = 'cw_trash';
    const MAX_TRASH    = 10;

    let localCards   = [];
    let trash        = [];
    let fromCache    = false;
    let deleteTimer  = null;
    let pendingIdx   = null;
    let prevBrightness = null;

    // ── Boot ──────────────────────────────────────────────────
    window.onload = function () {
        loadTrash();

        const cached = localStorage.getItem(CACHE_KEY);
        if (cached) {
            try {
                localCards = JSON.parse(cached);
                fromCache  = true;
                renderCards();
                const ts = localStorage.getItem(CACHE_TS_KEY);
                setSyncPill('idle', '缓存 · ' + relativeTime(+ts));
            } catch (_) {}
        }

        const savedPwd = localStorage.getItem(PWD_KEY);
        if (savedPwd) {
            document.getElementById('appPassword').value = savedPwd;
            // Auto-sync silently if password cached
            doSync(true);
        } else {
            // No password — show sync section expanded
            document.getElementById('sync-expand').classList.add('show');
        }

        updateSyncDot('idle');
    };

    // ── Sync pill (header shortcut) ──────────────────────────
    function onSyncPillTap() {
        const hasPwd = !!localStorage.getItem(PWD_KEY);
        if (hasPwd) {
            doSync();
        } else {
            // Scroll to sync section and expand
            document.getElementById('sync-expand').classList.add('show');
            document.getElementById('appPassword').focus();
            document.querySelector('.section:last-child').scrollIntoView({ behavior: 'smooth' });
        }
    }

    // ── Cloud sync button ─────────────────────────────────────
    function onSyncButtonTap() {
        const hasPwd = !!localStorage.getItem(PWD_KEY);
        if (hasPwd) {
            doSync();
        } else {
            const exp = document.getElementById('sync-expand');
            exp.classList.toggle('show');
            if (exp.classList.contains('show')) {
                setTimeout(() => document.getElementById('appPassword').focus(), 50);
            }
        }
    }

    async function doSync(silent = false) {
        const password = document.getElementById('appPassword').value.trim()
                      || localStorage.getItem(PWD_KEY);
        if (!password) {
            document.getElementById('sync-expand').classList.add('show');
            document.getElementById('appPassword').focus();
            return;
        }
        // Make sure input has the value (for display)
        document.getElementById('appPassword').value = password;

        setSyncPill('syncing', '同步中…');
        updateSyncDot('syncing');
        try {
            const res  = await fetch('/api/get-cards', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password })
            });
            const data = await res.json();
            if (res.ok) {
                localCards = data.cards;
                fromCache  = false;
                localStorage.setItem(PWD_KEY, password);
                saveCache();
                renderCards();
                setSyncPill('ok', '已同步 ✓');
                updateSyncDot('ok');
                updateSyncBtnLabel();
                // Collapse sync panel after success
                document.getElementById('sync-expand').classList.remove('show');
                if (!silent) toast('同步成功，共 ' + localCards.length + ' 张卡片');
            } else {
                setSyncPill('error', '失败');
                updateSyncDot('error');
                toast(data.error || '同步失败');
            }
        } catch (_) {
            setSyncPill('error', '网络错误');
            updateSyncDot('error');
            toast('网络错误');
        }
    }

    function updateSyncBtnLabel() {
        const ts = localStorage.getItem(CACHE_TS_KEY);
        document.getElementById('sync-btn-label').textContent =
            ts ? '云端同步 · ' + relativeTime(+ts) : '云端同步';
    }

    function setSyncPill(state, text) {
        const pill = document.getElementById('sync-pill');
        pill.className = state;
        document.getElementById('sync-text').textContent = text;
    }

    function updateSyncDot(state) {
        const dot = document.getElementById('sync-dot');
        dot.className = 'sync-status-dot' + (state === 'ok' ? ' ok' : state === 'error' ? ' error' : '');
    }

    function relativeTime(ts) {
        if (!ts) return '';
        const d = Math.round((Date.now() - ts) / 1000);
        if (d < 10)   return '刚刚';
        if (d < 60)   return d + '秒前';
        if (d < 3600) return Math.round(d / 60) + '分钟前';
        return Math.round(d / 3600) + '小时前';
    }

    // ── Toast ─────────────────────────────────────────────────
    let _tt;
    function toast(msg) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.classList.add('show');
        clearTimeout(_tt);
        _tt = setTimeout(() => el.classList.remove('show'), 2500);
    }

    // ── Add card ──────────────────────────────────────────────
    function toggleAddForm() {
        const f = document.getElementById('add-form');
        f.classList.toggle('show');
        if (f.classList.contains('show')) document.getElementById('cardName').focus();
    }

    async function addCard() {
        const password = document.getElementById('appPassword').value.trim()
                      || localStorage.getItem(PWD_KEY);
        const name   = document.getElementById('cardName').value.trim();
        const number = document.getElementById('cardNumber').value.trim();
        const format = document.getElementById('cardFormat').value;

        if (!password) return toast('请先完成云端同步验证');
        if (!name || !number) return toast('请填写卡片名称和卡号');

        localCards.push({ name, number, format });
        fromCache = false;
        renderCards();
        document.getElementById('cardName').value  = '';
        document.getElementById('cardNumber').value = '';
        toggleAddForm();
        saveCache();

        setSyncPill('syncing', '保存中…');
        try {
            const res = await fetch('/api/save-cards', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password, cards: localCards })
            });
            setSyncPill(res.ok ? 'ok' : 'error', res.ok ? '已同步 ✓' : '保存失败');
            updateSyncDot(res.ok ? 'ok' : 'error');
            if (!res.ok) toast('云端保存失败');
            else toast('已保存');
        } catch (_) {
            setSyncPill('error', '网络错误');
            updateSyncDot('error');
            toast('网络错误，卡片已存到本地缓存');
        }
    }

    // ── Delete (action sheet + undo) ──────────────────────────
    function deleteCard(index) {
        pendingIdx = index;
        document.getElementById('action-title').textContent = '确定要删除"' + localCards[index].name + '"？';
        document.getElementById('action-overlay').classList.add('show');
    }

    function cancelDelete(e) {
        if (e && e.target !== document.getElementById('action-overlay')) return;
        document.getElementById('action-overlay').classList.remove('show');
        pendingIdx = null;
    }

    async function confirmDelete() {
        document.getElementById('action-overlay').classList.remove('show');
        if (pendingIdx === null) return;

        const index    = pendingIdx; pendingIdx = null;
        const password = document.getElementById('appPassword').value.trim()
                      || localStorage.getItem(PWD_KEY);
        const card = localCards[index];

        // Move to trash (cap at MAX_TRASH)
        trash.unshift({ ...card, deletedAt: Date.now() });
        if (trash.length > MAX_TRASH) trash = trash.slice(0, MAX_TRASH);
        saveTrash();

        localCards.splice(index, 1);
        renderCards();
        saveCache();

        // Undo window
        clearTimeout(deleteTimer);
        showUndoBanner(card.name);

        deleteTimer = setTimeout(() => {
            hideUndoBanner();
            permanentlySync(password);
        }, 5000);

        document.getElementById('btn-undo').onclick = () => {
            clearTimeout(deleteTimer);
            hideUndoBanner();
            undoDelete();
        };
    }

    function undoDelete() {
        if (trash.length === 0) return;
        const card = trash.shift();
        saveTrash();
        delete card.deletedAt;
        localCards.push(card);
        renderCards();
        saveCache();
        toast('已恢复"' + card.name + '"');
    }

    function showUndoBanner(name) {
        document.getElementById('undo-title').textContent = '已删除"' + name + '"';
        document.getElementById('undo-sub').textContent   = '5秒内可撤销';
        document.getElementById('undo-banner').classList.add('show');
    }

    function hideUndoBanner() {
        document.getElementById('undo-banner').classList.remove('show');
    }

    async function permanentlySync(password) {
        if (!password) return;
        try {
            const res = await fetch('/api/save-cards', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password, cards: localCards })
            });
            setSyncPill(res.ok ? 'ok' : 'error', res.ok ? '已同步 ✓' : '同步失败');
            updateSyncDot(res.ok ? 'ok' : 'error');
        } catch (_) {
            setSyncPill('error', '网络错误');
        }
    }

    // ── Trash ─────────────────────────────────────────────────
    function saveTrash() {
        localStorage.setItem(TRASH_KEY, JSON.stringify(trash));
        renderTrash();
    }

    function loadTrash() {
        try { trash = JSON.parse(localStorage.getItem(TRASH_KEY) || '[]'); } catch (_) { trash = []; }
        renderTrash();
    }

    function clearTrash() {
        trash = [];
        saveTrash();
        toast('回收站已清空');
    }

    function recoverFromTrash(index) {
        const card = { ...trash[index] };
        trash.splice(index, 1);
        delete card.deletedAt;
        saveTrash();   // re-renders trash
        localCards.push(card);
        renderCards();
        saveCache();
        toast('已恢复"' + card.name + '"');
    }

    function renderTrash() {
        const section = document.getElementById('trash-section');
        const list    = document.getElementById('trash-list');
        if (trash.length === 0) { section.classList.remove('show'); return; }
        section.classList.add('show');
        list.innerHTML = '';
        trash.forEach((card, i) => {
            const item = document.createElement('div');
            item.className = 'trash-item';

            const icon = document.createElement('div');
            icon.className = 'trash-icon';
            icon.textContent = '🗑';

            const info = document.createElement('div');
            info.className = 'trash-info';
            const nm  = document.createElement('strong'); nm.textContent = card.name;
            const sub = document.createElement('small');
            sub.textContent = card.number + ' · ' + timeAgo(card.deletedAt);
            info.appendChild(nm);
            info.appendChild(sub);

            const btn = document.createElement('button');
            btn.className = 'btn-recover';
            btn.textContent = '恢复';
            btn.onclick = () => recoverFromTrash(i);

            item.appendChild(icon);
            item.appendChild(info);
            item.appendChild(btn);
            list.appendChild(item);
        });
    }

    function timeAgo(ts) {
        if (!ts) return '';
        const d = Math.round((Date.now() - ts) / 1000);
        if (d < 60)   return '刚刚删除';
        if (d < 3600) return Math.round(d / 60) + '分钟前删除';
        if (d < 86400) return Math.round(d / 3600) + '小时前删除';
        return Math.round(d / 86400) + '天前删除';
    }

    // ── Local cache ───────────────────────────────────────────
    function saveCache() {
        localStorage.setItem(CACHE_KEY, JSON.stringify(localCards));
        localStorage.setItem(CACHE_TS_KEY, Date.now());
        updateSyncBtnLabel();
    }

    // ── Render cards ──────────────────────────────────────────
    const CARD_COLORS = [
        'linear-gradient(135deg,#667eea,#764ba2)',
        'linear-gradient(135deg,#f093fb,#f5576c)',
        'linear-gradient(135deg,#4facfe,#00f2fe)',
        'linear-gradient(135deg,#43e97b,#38f9d7)',
        'linear-gradient(135deg,#fa709a,#fee140)',
        'linear-gradient(135deg,#a18cd1,#fbc2eb)',
    ];

    function renderCards() {
        const listDiv = document.getElementById('card-list');
        document.getElementById('list-title').textContent =
            '卡包' + (localCards.length ? ' (' + localCards.length + ')' : '');

        if (localCards.length === 0) {
            listDiv.innerHTML = '';
            const empty = document.createElement('div');
            empty.className = 'empty-state';
            empty.textContent = '暂无卡片，点击下方添加';
            listDiv.appendChild(empty);
            return;
        }

        listDiv.innerHTML = '';
        localCards.forEach((card, i) => {
            const item = document.createElement('div');
            item.className = 'card-item';

            const icon = document.createElement('div');
            icon.className = 'card-icon';
            icon.style.background = CARD_COLORS[i % CARD_COLORS.length];
            icon.textContent = card.name.charAt(0).toUpperCase();

            const info = document.createElement('div');
            info.className = 'card-info';
            const nm  = document.createElement('strong'); nm.textContent = card.name;
            const sub = document.createElement('small');  sub.textContent = card.number;
            info.appendChild(nm);
            info.appendChild(sub);

            const actions = document.createElement('div');
            actions.className = 'card-actions';

            const showBtn = document.createElement('button');
            showBtn.className = 'btn-show';
            showBtn.textContent = '显示';
            showBtn.onclick = () => renderBarcode(card.name, card.number, card.format);

            const delBtn = document.createElement('button');
            delBtn.className = 'btn-delete';
            delBtn.textContent = '✕';
            delBtn.onclick = () => deleteCard(i);

            actions.appendChild(showBtn);
            actions.appendChild(delBtn);
            item.appendChild(icon);
            item.appendChild(info);
            item.appendChild(actions);
            listDiv.appendChild(item);
        });
    }

    // ── Barcode ───────────────────────────────────────────────
    function renderBarcode(name, number, format) {
        const section = document.getElementById('barcode-section');
        document.getElementById('display-name').textContent = name;
        section.classList.add('show');
        try {
            JsBarcode('#barcode-canvas', number, {
                format, lineColor: '#000', width: 2.5, height: 100, displayValue: true
            });
        } catch (_) {
            toast('条码渲染失败，请检查卡号格式');
            section.classList.remove('show');
            return;
        }
        section.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function closeBarcode() {
        restoreBrightness();
        document.getElementById('barcode-section').classList.remove('show');
    }

    function setBrightMax() {
        prevBrightness = document.documentElement.style.filter || '';
        document.documentElement.style.filter = 'brightness(2)';
        document.getElementById('btn-bright-max').style.display     = 'none';
        document.getElementById('btn-bright-restore').style.display = 'inline-block';
    }

    function restoreBrightness() {
        if (prevBrightness !== null) {
            document.documentElement.style.filter = prevBrightness;
            prevBrightness = null;
        }
        document.getElementById('btn-bright-max').style.display     = 'inline-block';
        document.getElementById('btn-bright-restore').style.display = 'none';
    }
</script>
</body>
</html>
