<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, maximum-scale=1.0, user-scalable=no">
    <title>Card Wallet</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        /* ══════════════════════════════════════════
           CSS Variables — one per theme
        ══════════════════════════════════════════ */
        :root {
            --bg:           #f2f2f7;
            --surface:      #ffffff;
            --surface2:     #f9f9fb;
            --border:       #e5e5ea;
            --sep:          #f2f2f7;
            --text1:        #1c1c1e;
            --text2:        #636366;
            --text3:        #8e8e93;
            --accent:       #007aff;
            --danger:       #ff3b30;
            --success-bg:   #d1f5e0;
            --success-text: #1c8a3f;
            --warn-bg:      #fff3cd;
            --warn-text:    #856404;
            --radius:       12px;
            --card-pad:     13px 16px;
            --font-card:    15px;
            --font-sub:     12px;
            --header-bg:    #ffffff;
        }

        [data-theme="dark"] {
            --bg:           #000000;
            --surface:      #1c1c1e;
            --surface2:     #2c2c2e;
            --border:       #3a3a3c;
            --sep:          #2c2c2e;
            --text1:        #f2f2f7;
            --text2:        #aeaeb2;
            --text3:        #636366;
            --accent:       #0a84ff;
            --danger:       #ff453a;
            --success-bg:   #1a3a2a;
            --success-text: #30d158;
            --warn-bg:      #332800;
            --warn-text:    #ffd60a;
            --header-bg:    #1c1c1e;
        }

        [data-theme="cards"] {
            --bg:           #0f172a;
            --surface:      #1e293b;
            --surface2:     #334155;
            --border:       #334155;
            --sep:          #1e293b;
            --text1:        #f1f5f9;
            --text2:        #94a3b8;
            --text3:        #64748b;
            --accent:       #38bdf8;
            --danger:       #f87171;
            --success-bg:   #052e16;
            --success-text: #4ade80;
            --warn-bg:      #451a03;
            --warn-text:    #fb923c;
            --header-bg:    #1e293b;
        }

        [data-theme="minimal"] {
            --bg:           #ffffff;
            --surface:      #ffffff;
            --surface2:     #ffffff;
            --border:       #e5e5ea;
            --sep:          #f0f0f0;
            --text1:        #000000;
            --text2:        #555555;
            --text3:        #999999;
            --accent:       #000000;
            --danger:       #cc0000;
            --success-bg:   #f0fdf4;
            --success-text: #166534;
            --warn-bg:      #fefce8;
            --warn-text:    #713f12;
            --radius:       6px;
            --header-bg:    #ffffff;
        }

        /* ══════════════════════════════════════════
           Base
        ══════════════════════════════════════════ */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            padding-bottom: 60px;
            transition: background .3s, color .3s;
            color: var(--text1);
        }

        /* ── Header ── */
        header {
            background: var(--header-bg);
            border-bottom: 1px solid var(--border);
            padding: 14px 16px;
            position: sticky; top: 0; z-index: 10;
            display: flex; align-items: center; justify-content: space-between;
            gap: 8px;
        }
        header h1 { font-size: 20px; font-weight: 700; color: var(--text1); }

        .header-right { display: flex; align-items: center; gap: 6px; }

        /* Theme cycle button */
        #theme-btn {
            padding: 5px 11px; border-radius: 20px; border: none;
            background: var(--surface2); color: var(--text2);
            font-size: 12px; font-weight: 600; cursor: pointer;
            transition: all .2s;
        }
        [data-theme="minimal"] #theme-btn { border: 1px solid var(--border); }

        /* Sync pill */
        #sync-pill {
            display: inline-flex; align-items: center; gap: 5px;
            font-size: 12px; font-weight: 500; padding: 5px 11px;
            border-radius: 20px; cursor: pointer; border: none;
            transition: background .3s, color .3s;
        }
        #sync-pill.idle    { background: var(--surface2); color: var(--text3); }
        #sync-pill.syncing { background: var(--surface2); color: var(--text3); }
        #sync-pill.ok      { background: var(--success-bg); color: var(--success-text); }
        #sync-pill.error   { background: #ffe5e5; color: var(--danger); }
        [data-theme="dark"] #sync-pill.error,
        [data-theme="cards"] #sync-pill.error { background: #3a1515; }

        .spinner {
            width: 10px; height: 10px;
            border: 2px solid currentColor; border-top-color: transparent;
            border-radius: 50%; animation: spin .7s linear infinite; display: none;
        }
        #sync-pill.syncing .spinner { display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Toast ── */
        #toast {
            position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
            background: rgba(28,28,30,.9); color: #fff;
            padding: 11px 20px; border-radius: 22px;
            font-size: 14px; font-weight: 500;
            opacity: 0; transition: opacity .2s;
            pointer-events: none; white-space: nowrap; z-index: 300;
        }
        #toast.show { opacity: 1; }

        /* ── Action sheet ── */
        #action-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,.5); z-index: 200;
            align-items: flex-end; justify-content: center;
        }
        #action-overlay.show { display: flex; }
        .action-sheet {
            background: var(--bg); border-radius: 16px 16px 0 0;
            width: 100%; max-width: 500px;
            padding: 0 16px 36px;
            animation: slideUp .22s ease;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .action-handle {
            width: 36px; height: 4px; background: var(--border);
            border-radius: 2px; margin: 10px auto 14px;
        }
        .action-title {
            text-align: center; font-size: 14px; color: var(--text2);
            margin-bottom: 14px; padding: 0 8px; line-height: 1.4;
        }
        .action-btn {
            display: block; width: 100%; padding: 15px;
            border: none; border-radius: var(--radius);
            font-size: 17px; cursor: pointer; margin-bottom: 8px; font-weight: 500;
            transition: opacity .15s;
        }
        .action-btn:active { opacity: .7; }
        .action-btn.danger  { background: var(--surface); color: var(--danger); }
        .action-btn.cancel  { background: var(--surface); color: var(--accent); font-weight: 700; }

        /* ── Undo banner ── */
        #undo-banner {
            display: none; margin: 12px 16px 0;
            background: var(--warn-bg); border: 1px solid var(--border);
            padding: 12px 14px; border-radius: var(--radius);
            align-items: center; gap: 10px;
        }
        #undo-banner.show { display: flex; }
        .undo-bar { flex: 1; }
        .undo-bar strong { display: block; font-size: 14px; color: var(--warn-text); }
        .undo-bar small { font-size: 12px; color: var(--text3); }
        .btn-undo {
            padding: 8px 16px; border-radius: 8px; border: none;
            background: var(--warn-text); color: #fff;
            font-size: 13px; font-weight: 600; cursor: pointer;
        }

        /* ── Section ── */
        .section {
            background: var(--surface); border-radius: var(--radius);
            margin: 14px 16px 0; overflow: hidden;
            box-shadow: 0 1px 2px rgba(0,0,0,.06);
            transition: background .3s;
        }
        [data-theme="minimal"] .section {
            border: 1px solid var(--border); box-shadow: none;
        }
        .section-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 16px 6px;
        }
        .section-title {
            font-size: 12px; font-weight: 600; color: var(--text3);
            text-transform: uppercase; letter-spacing: .4px;
        }

        /* ══════════════════════════════════════════
           THEME: clean + dark + minimal  — list cards
        ══════════════════════════════════════════ */
        .card-item {
            display: flex; align-items: center;
            padding: var(--card-pad); gap: 12px;
            transition: background .15s;
        }
        .card-item + .card-item { border-top: 1px solid var(--sep); }
        .card-icon {
            width: 38px; height: 38px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; font-size: 16px; font-weight: 700; color: #fff;
        }
        .card-info { flex: 1; min-width: 0; }
        .card-info strong {
            font-size: var(--font-card); color: var(--text1);
            display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .card-info small { font-size: var(--font-sub); color: var(--text3); margin-top: 1px; display: block; }
        .card-actions { display: flex; gap: 6px; flex-shrink: 0; }

        .btn-show {
            padding: 7px 14px; border-radius: 8px;
            background: var(--accent); color: #fff;
            border: none; font-size: 13px; font-weight: 600; cursor: pointer;
        }
        .btn-delete {
            width: 32px; height: 32px; border-radius: 8px;
            background: var(--sep); color: var(--danger);
            border: none; font-size: 13px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-show:active, .btn-delete:active { opacity: .7; }

        [data-theme="minimal"] .btn-show { border: 1.5px solid #000; background: #000; border-radius: 4px; }
        [data-theme="minimal"] .btn-delete { border: 1.5px solid var(--danger); background: transparent; border-radius: 4px; }

        .empty-state { padding: 28px 16px; text-align: center; color: var(--text3); font-size: 15px; }

        /* ══════════════════════════════════════════
           THEME: cards — physical credit-card style
        ══════════════════════════════════════════ */
        #card-list.card-style {
            padding: 8px 0;
            display: flex; flex-direction: column; gap: 0;
        }
        .card-physical {
            margin: 6px 12px; border-radius: 16px;
            min-height: 120px; padding: 18px 20px;
            display: flex; flex-direction: column; justify-content: space-between;
            color: #fff; position: relative; overflow: hidden;
            box-shadow: 0 6px 24px rgba(0,0,0,.35);
        }
        .card-physical::before {
            content: ''; position: absolute;
            width: 160px; height: 160px; border-radius: 50%;
            background: rgba(255,255,255,.08);
            top: -40px; right: -40px;
        }
        .card-physical::after {
            content: ''; position: absolute;
            width: 100px; height: 100px; border-radius: 50%;
            background: rgba(255,255,255,.06);
            bottom: -20px; left: 20px;
        }
        .card-physical-top { display: flex; align-items: flex-start; justify-content: space-between; }
        .card-physical-name { font-size: 17px; font-weight: 700; text-shadow: 0 1px 4px rgba(0,0,0,.3); max-width: 70%; }
        .card-physical-fmt  { font-size: 10px; font-weight: 600; opacity: .7; margin-top: 2px; letter-spacing: .5px; }
        .card-physical-bottom {
            display: flex; align-items: flex-end; justify-content: space-between;
        }
        .card-physical-num { font-size: 13px; opacity: .8; font-family: 'Courier New', monospace; }
        .card-physical-actions { display: flex; gap: 6px; }
        .card-physical-actions button {
            padding: 6px 14px; border-radius: 8px; border: none;
            font-size: 13px; font-weight: 600; cursor: pointer;
        }
        .card-physical-actions .btn-show-ph {
            background: rgba(255,255,255,.25); color: #fff;
            backdrop-filter: blur(4px);
        }
        .card-physical-actions .btn-del-ph {
            background: rgba(255,255,255,.15); color: #fff;
            backdrop-filter: blur(4px);
        }

        /* ══════════════════════════════════════════
           THEME: minimal — borderless compact list
        ══════════════════════════════════════════ */
        [data-theme="minimal"] .card-item {
            padding: 10px 16px;
        }
        [data-theme="minimal"] .card-icon { display: none; }
        [data-theme="minimal"] .card-info strong { font-size: 14px; }
        [data-theme="minimal"] .card-info small { font-size: 11px; }

        /* ── Add card ── */
        .btn-add-main {
            display: block; width: calc(100% - 32px);
            margin: 14px 16px; padding: 14px;
            background: var(--accent); color: #fff;
            border: none; border-radius: var(--radius);
            font-size: 16px; font-weight: 600; cursor: pointer;
            transition: opacity .15s;
        }
        [data-theme="minimal"] .btn-add-main {
            background: #000; border-radius: 4px;
        }
        .btn-add-main:active { opacity: .75; }

        #add-form { display: none; border-top: 1px solid var(--sep); }
        #add-form.show { display: block; }
        .form-row {
            display: flex; align-items: center;
            padding: 0 16px; border-bottom: 1px solid var(--sep);
        }
        .form-row label { font-size: 13px; color: var(--text3); width: 50px; flex-shrink: 0; }
        .form-row input, .form-row select {
            flex: 1; padding: 13px 0 13px 8px;
            border: none; font-size: 16px;
            background: transparent; outline: none; color: var(--text1);
            -webkit-appearance: none;
        }
        .form-actions { display: flex; gap: 8px; padding: 12px 16px 14px; }
        .btn-save {
            flex: 1; padding: 12px; background: var(--accent); color: #fff;
            border: none; border-radius: var(--radius); font-size: 15px; font-weight: 600; cursor: pointer;
        }
        .btn-cancel-form {
            flex: 1; padding: 12px; background: var(--sep); color: var(--text1);
            border: none; border-radius: var(--radius); font-size: 15px; font-weight: 600; cursor: pointer;
        }
        [data-theme="minimal"] .btn-save { border-radius: 4px; }
        [data-theme="minimal"] .btn-cancel-form { border-radius: 4px; }

        /* ── Barcode ── */
        #barcode-section { display: none; }
        #barcode-section.show { display: block; }
        .barcode-inner { padding: 16px; text-align: center; border-top: 1px solid var(--sep); }
        .barcode-inner svg { background: #fff; border-radius: 8px; padding: 8px; max-width: 100%; }
        #display-name { font-size: 15px; font-weight: 600; margin-bottom: 12px; color: var(--text1); }
        .barcode-btns { display: flex; gap: 8px; justify-content: center; margin-top: 12px; }
        .btn-barcode {
            padding: 9px 16px; border-radius: 9px; border: none;
            font-size: 14px; font-weight: 500; cursor: pointer;
        }
        .btn-barcode.gray   { background: var(--sep); color: var(--text2); }
        .btn-barcode.yellow { background: var(--warn-bg); color: var(--warn-text); }
        .btn-barcode.green  { background: var(--success-bg); color: var(--success-text); display: none; }

        /* ── Trash ── */
        #trash-section { display: none; }
        #trash-section.show { display: block; }
        .trash-item {
            display: flex; align-items: center;
            padding: 11px 16px; gap: 10px;
        }
        .trash-item + .trash-item { border-top: 1px solid var(--sep); }
        .trash-info { flex: 1; min-width: 0; }
        .trash-info strong { font-size: 14px; color: var(--text2); display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .trash-info small  { font-size: 11px; color: var(--text3); }
        .btn-recover {
            padding: 6px 13px; border-radius: 7px;
            background: var(--success-bg); color: var(--success-text);
            border: none; font-size: 13px; font-weight: 600; cursor: pointer; flex-shrink: 0;
        }
        .btn-clear-trash {
            border: none; background: transparent; color: var(--danger); font-size: 13px; cursor: pointer;
        }

        /* ── Cloud sync ── */
        .btn-sync-main {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            width: calc(100% - 32px); margin: 14px 16px; padding: 14px;
            background: var(--surface2); color: var(--text1);
            border: none; border-radius: var(--radius);
            font-size: 15px; font-weight: 500; cursor: pointer; transition: opacity .15s;
        }
        [data-theme="minimal"] .btn-sync-main { border: 1px solid var(--border); border-radius: 4px; }
        .btn-sync-main:active { opacity: .7; }
        .sync-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--text3); flex-shrink: 0; transition: background .3s;
        }
        .sync-dot.ok    { background: #30d158; }
        .sync-dot.error { background: var(--danger); }

        #sync-expand { display: none; border-top: 1px solid var(--sep); }
        #sync-expand.show { display: block; }
        .sync-expand-inner { display: flex; gap: 8px; padding: 12px 16px 14px; }
        .sync-expand-inner input {
            flex: 1; padding: 11px 14px;
            border: 1.5px solid var(--border); border-radius: 10px;
            font-size: 15px; background: var(--surface2); outline: none; color: var(--text1);
        }
        .sync-expand-inner input:focus { border-color: var(--accent); }
        .btn-do-sync {
            padding: 11px 18px; border-radius: 10px;
            background: var(--accent); color: #fff;
            border: none; font-size: 15px; font-weight: 600; cursor: pointer;
        }
        [data-theme="minimal"] .sync-expand-inner input { border-radius: 4px; }
        [data-theme="minimal"] .btn-do-sync { border-radius: 4px; }
    </style>
</head>
<body data-theme="clean">

<header>
    <h1>我的卡包</h1>
    <div class="header-right">
        <button id="theme-btn" onclick="cycleTheme()">简洁</button>
        <button id="sync-pill" class="idle" onclick="onSyncPillTap()">
            <div class="spinner"></div>
            <span id="sync-text">未同步</span>
        </button>
    </div>
</header>

<div id="toast"></div>

<!-- Action sheet -->
<div id="action-overlay" onclick="overlayTap(event)">
    <div class="action-sheet">
        <div class="action-handle"></div>
        <div class="action-title" id="action-title"></div>
        <button class="action-btn danger" onclick="confirmDelete()">删除</button>
        <button class="action-btn cancel" onclick="closeActionSheet()">取消</button>
    </div>
</div>

<!-- Undo banner -->
<div id="undo-banner">
    <div class="undo-bar">
        <strong id="undo-title"></strong>
        <small id="undo-sub"></small>
    </div>
    <button class="btn-undo" id="btn-undo">撤销</button>
</div>

<!-- Card list -->
<div class="section">
    <div class="section-header">
        <span class="section-title" id="list-title">卡包</span>
    </div>
    <div id="card-list"><div class="empty-state">暂无卡片，点击下方添加</div></div>
</div>

<!-- Add card -->
<div class="section">
    <button class="btn-add-main" onclick="toggleAddForm()">+ 添加新卡片</button>
    <div id="add-form">
        <div class="form-row">
            <label>名称</label>
            <input type="text" id="cardName" placeholder="例如 T&T Supermarket" />
        </div>
        <div class="form-row">
            <label>卡号</label>
            <input type="number" id="cardNumber" placeholder="例如 41012345678" />
        </div>
        <div class="form-row">
            <label>格式</label>
            <select id="cardFormat">
                <option value="CODE128">Code 128（通用，推荐）</option>
                <option value="UPC">UPC-A（11/12 位）</option>
                <option value="EAN13">EAN-13（12/13 位）</option>
            </select>
        </div>
        <div class="form-actions">
            <button class="btn-save" onclick="addCard()">保存</button>
            <button class="btn-cancel-form" onclick="toggleAddForm()">取消</button>
        </div>
    </div>
</div>

<!-- Barcode -->
<div class="section" id="barcode-section">
    <div class="section-header">
        <span class="section-title" id="display-name"></span>
        <button class="btn-barcode gray" style="padding:5px 10px;font-size:13px;" onclick="closeBarcode()">关闭</button>
    </div>
    <div class="barcode-inner">
        <svg id="barcode-canvas"></svg>
        <div class="barcode-btns">
            <button class="btn-barcode yellow" id="btn-bright-max"     onclick="setBrightMax()">☀️ 最亮</button>
            <button class="btn-barcode green"  id="btn-bright-restore" onclick="restoreBrightness()">↩ 恢复亮度</button>
        </div>
    </div>
</div>

<!-- Trash -->
<div class="section" id="trash-section">
    <div class="section-header">
        <span class="section-title">回收站</span>
        <button class="btn-clear-trash" onclick="clearTrash()">全部清除</button>
    </div>
    <div id="trash-list"></div>
</div>

<!-- Cloud sync -->
<div class="section">
    <button class="btn-sync-main" onclick="onSyncButtonTap()">
        <span class="sync-dot" id="sync-dot"></span>
        <span id="sync-btn-label">云端同步</span>
    </button>
    <div id="sync-expand">
        <div class="sync-expand-inner">
            <input type="password" id="appPassword" placeholder="访问密码" autocomplete="current-password" />
            <button class="btn-do-sync" onclick="doSync()">同步</button>
        </div>
    </div>
</div>

<script>
    /* ── Constants ── */
    const CACHE_KEY    = 'cw_cards_cache';
    const CACHE_TS_KEY = 'cw_cache_ts';
    const PWD_KEY      = 'wallet_pwd';
    const TRASH_KEY    = 'cw_trash';
    const THEME_KEY    = 'cw_theme';
    const MAX_TRASH    = 10;

    const THEMES       = ['clean','dark','cards','minimal'];
    const THEME_LABELS = ['简洁','夜间','卡片','极简'];
    const NEXT_LABELS  = ['夜间','卡片','极简','简洁'];   // label for "next" on button

    const CARD_COLORS = [
        'linear-gradient(135deg,#667eea,#764ba2)',
        'linear-gradient(135deg,#f093fb,#f5576c)',
        'linear-gradient(135deg,#4facfe,#00f2fe)',
        'linear-gradient(135deg,#43e97b,#38f9d7)',
        'linear-gradient(135deg,#fa709a,#fee140)',
        'linear-gradient(135deg,#f7971e,#ffd200)',
        'linear-gradient(135deg,#30cfd0,#330867)',
        'linear-gradient(135deg,#a18cd1,#fbc2eb)',
    ];

    /* ── State ── */
    let localCards         = [];
    let trash              = [];
    let fromCache          = false;
    let deleteTimer        = null;
    let pendingIdx         = null;
    let pendingUndoTs      = null;   // deletedAt of card pending undo
    let prevBrightness     = null;
    let currentTheme       = localStorage.getItem(THEME_KEY) || 'clean';

    /* ── Boot ── */
    window.onload = function () {
        applyTheme(false);
        loadTrash();

        const cached = localStorage.getItem(CACHE_KEY);
        if (cached) {
            try {
                localCards = JSON.parse(cached);
                fromCache  = true;
                renderCards();
                const ts = localStorage.getItem(CACHE_TS_KEY);
                setSyncPill('idle', '缓存 · ' + relativeTime(+ts));
            } catch (_) {}
        }

        const savedPwd = localStorage.getItem(PWD_KEY);
        if (savedPwd) {
            document.getElementById('appPassword').value = savedPwd;
            doSync(true);
        } else {
            document.getElementById('sync-expand').classList.add('show');
        }
    };

    /* ── Theme ── */
    function cycleTheme() {
        const idx = THEMES.indexOf(currentTheme);
        currentTheme = THEMES[(idx + 1) % THEMES.length];
        localStorage.setItem(THEME_KEY, currentTheme);
        applyTheme(true);
    }

    function applyTheme(rerender) {
        document.body.setAttribute('data-theme', currentTheme);
        const idx = THEMES.indexOf(currentTheme);
        document.getElementById('theme-btn').textContent = NEXT_LABELS[idx];
        if (rerender) renderCards();
    }

    /* ── Sync pill shortcut ── */
    function onSyncPillTap() {
        if (localStorage.getItem(PWD_KEY)) { doSync(); }
        else {
            document.getElementById('sync-expand').classList.add('show');
            document.getElementById('appPassword').focus();
            document.querySelector('.section:last-child').scrollIntoView({ behavior: 'smooth' });
        }
    }

    /* ── Cloud sync button ── */
    function onSyncButtonTap() {
        if (localStorage.getItem(PWD_KEY)) { doSync(); }
        else {
            const exp = document.getElementById('sync-expand');
            exp.classList.toggle('show');
            if (exp.classList.contains('show'))
                setTimeout(() => document.getElementById('appPassword').focus(), 50);
        }
    }

    async function doSync(silent = false) {
        const password = document.getElementById('appPassword').value.trim()
                      || localStorage.getItem(PWD_KEY);
        if (!password) {
            document.getElementById('sync-expand').classList.add('show');
            document.getElementById('appPassword').focus();
            return;
        }
        document.getElementById('appPassword').value = password;
        setSyncPill('syncing', '同步中…'); setDot('');

        try {
            const res  = await fetch('/api/get-cards', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password })
            });
            const data = await res.json();
            if (res.ok) {
                localCards = data.cards; fromCache = false;
                localStorage.setItem(PWD_KEY, password);
                saveCache(); renderCards();
                setSyncPill('ok', '已同步 ✓'); setDot('ok');
                updateSyncLabel();
                document.getElementById('sync-expand').classList.remove('show');
                if (!silent) toast('同步成功，共 ' + localCards.length + ' 张卡片');
            } else {
                setSyncPill('error', '失败'); setDot('error');
                toast(data.error || '同步失败');
            }
        } catch (_) {
            setSyncPill('error', '网络错误'); setDot('error'); toast('网络错误');
        }
    }

    function updateSyncLabel() {
        const ts = localStorage.getItem(CACHE_TS_KEY);
        document.getElementById('sync-btn-label').textContent =
            ts ? '云端同步 · ' + relativeTime(+ts) : '云端同步';
    }

    function setSyncPill(state, text) {
        document.getElementById('sync-pill').className = state;
        document.getElementById('sync-text').textContent = text;
    }
    function setDot(state) {
        document.getElementById('sync-dot').className =
            'sync-dot' + (state ? ' ' + state : '');
    }
    function relativeTime(ts) {
        if (!ts) return '';
        const d = Math.round((Date.now() - ts) / 1000);
        if (d < 10)    return '刚刚';
        if (d < 60)    return d + '秒前';
        if (d < 3600)  return Math.round(d / 60) + '分钟前';
        return Math.round(d / 3600) + '小时前';
    }

    /* ── Toast ── */
    let _tt;
    function toast(msg) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.classList.add('show');
        clearTimeout(_tt);
        _tt = setTimeout(() => el.classList.remove('show'), 2500);
    }

    /* ── Add card ── */
    function toggleAddForm() {
        const f = document.getElementById('add-form');
        f.classList.toggle('show');
        if (f.classList.contains('show')) document.getElementById('cardName').focus();
    }

    async function addCard() {
        const password = document.getElementById('appPassword').value.trim()
                      || localStorage.getItem(PWD_KEY);
        const name   = document.getElementById('cardName').value.trim();
        const number = document.getElementById('cardNumber').value.trim();
        const format = document.getElementById('cardFormat').value;

        if (!password) return toast('请先完成云端同步验证');
        if (!name || !number) return toast('请填写卡片名称和卡号');

        localCards.push({ name, number, format });
        renderCards();
        document.getElementById('cardName').value  = '';
        document.getElementById('cardNumber').value = '';
        toggleAddForm();
        saveCache();
        setSyncPill('syncing', '保存中…');

        try {
            const res = await fetch('/api/save-cards', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password, cards: localCards })
            });
            const ok = res.ok;
            setSyncPill(ok ? 'ok' : 'error', ok ? '已同步 ✓' : '保存失败');
            setDot(ok ? 'ok' : 'error');
            toast(ok ? '已保存' : '云端保存失败');
        } catch (_) {
            setSyncPill('error', '网络错误'); setDot('error');
            toast('网络错误，已存到本地缓存');
        }
    }

    /* ── Delete (action sheet) ── */
    function deleteCard(index) {
        pendingIdx = index;
        document.getElementById('action-title').textContent =
            '确定要删除"' + localCards[index].name + '"？';
        document.getElementById('action-overlay').classList.add('show');
    }

    function overlayTap(e) {
        if (e.target === document.getElementById('action-overlay')) closeActionSheet();
    }
    function closeActionSheet() {
        document.getElementById('action-overlay').classList.remove('show');
        pendingIdx = null;
    }

    async function confirmDelete() {
        document.getElementById('action-overlay').classList.remove('show');
        if (pendingIdx === null) return;
        const index    = pendingIdx; pendingIdx = null;
        const password = document.getElementById('appPassword').value.trim()
                      || localStorage.getItem(PWD_KEY);
        const card = localCards[index];

        const deletedAt = Date.now();
        trash.unshift({ ...card, deletedAt });
        if (trash.length > MAX_TRASH) trash = trash.slice(0, MAX_TRASH);
        saveTrash();

        localCards.splice(index, 1);
        renderCards(); saveCache();

        // Track this as the pending undo item
        pendingUndoTs = deletedAt;
        clearTimeout(deleteTimer);
        showUndo(card.name);

        deleteTimer = setTimeout(() => {
            pendingUndoTs = null;
            hideUndo();
            permanentlySync(password);
        }, 5000);

        document.getElementById('btn-undo').onclick = () => {
            clearTimeout(deleteTimer);
            pendingUndoTs = null;
            hideUndo();
            undoDelete();
        };
    }

    function undoDelete() {
        if (trash.length === 0) return;
        const card = { ...trash.shift() };
        saveTrash();
        delete card.deletedAt;
        localCards.push(card);
        renderCards(); saveCache();
        toast('已恢复"' + card.name + '"');
    }

    function showUndo(name) {
        document.getElementById('undo-title').textContent = '已删除"' + name + '"';
        document.getElementById('undo-sub').textContent   = '5秒内可撤销';
        document.getElementById('undo-banner').classList.add('show');
    }
    function hideUndo() {
        document.getElementById('undo-banner').classList.remove('show');
    }

    async function permanentlySync(password) {
        if (!password) return;
        try {
            const res = await fetch('/api/save-cards', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password, cards: localCards })
            });
            setSyncPill(res.ok ? 'ok' : 'error', res.ok ? '已同步 ✓' : '同步失败');
            setDot(res.ok ? 'ok' : 'error');
        } catch (_) { setSyncPill('error', '网络错误'); setDot('error'); }
    }

    /* ── Trash ── */
    function saveTrash() {
        localStorage.setItem(TRASH_KEY, JSON.stringify(trash));
        renderTrash();
    }
    function loadTrash() {
        try { trash = JSON.parse(localStorage.getItem(TRASH_KEY) || '[]'); } catch (_) { trash = []; }
        renderTrash();
    }
    function clearTrash() { trash = []; saveTrash(); toast('回收站已清空'); }

    function recoverFromTrash(index) {
        const card     = { ...trash[index] };
        const matchTs  = card.deletedAt;
        trash.splice(index, 1);
        delete card.deletedAt;
        saveTrash();  // re-renders trash
        localCards.push(card); renderCards(); saveCache();
        toast('已恢复"' + card.name + '"');

        // If this was the pending-undo item, cancel the undo window
        if (matchTs === pendingUndoTs) {
            clearTimeout(deleteTimer);
            pendingUndoTs = null;
            hideUndo();
        }
    }

    function renderTrash() {
        const section = document.getElementById('trash-section');
        const list    = document.getElementById('trash-list');
        if (trash.length === 0) { section.classList.remove('show'); return; }
        section.classList.add('show');
        list.innerHTML = '';
        trash.forEach((card, i) => {
            const item = document.createElement('div');
            item.className = 'trash-item';

            const info = document.createElement('div');
            info.className = 'trash-info';
            const nm  = document.createElement('strong'); nm.textContent = card.name;
            const sub = document.createElement('small');  sub.textContent = card.number + ' · ' + timeAgo(card.deletedAt);
            info.appendChild(nm); info.appendChild(sub);

            const btn = document.createElement('button');
            btn.className = 'btn-recover';
            btn.textContent = '恢复';
            btn.onclick = () => recoverFromTrash(i);

            item.appendChild(info);
            item.appendChild(btn);
            list.appendChild(item);
        });
    }

    function timeAgo(ts) {
        if (!ts) return '';
        const d = Math.round((Date.now() - ts) / 1000);
        if (d < 60)    return '刚刚删除';
        if (d < 3600)  return Math.round(d / 60) + '分钟前删除';
        if (d < 86400) return Math.round(d / 3600) + '小时前删除';
        return Math.round(d / 86400) + '天前删除';
    }

    /* ── Cache ── */
    function saveCache() {
        localStorage.setItem(CACHE_KEY, JSON.stringify(localCards));
        localStorage.setItem(CACHE_TS_KEY, Date.now());
        updateSyncLabel();
    }

    /* ── Render cards (theme-aware) ── */
    function renderCards() {
        const listDiv = document.getElementById('card-list');
        document.getElementById('list-title').textContent =
            '卡包' + (localCards.length ? ' (' + localCards.length + ')' : '');

        listDiv.innerHTML = '';
        if (localCards.length === 0) {
            listDiv.classList.remove('card-style');
            const empty = document.createElement('div');
            empty.className = 'empty-state';
            empty.textContent = '暂无卡片，点击下方添加';
            listDiv.appendChild(empty);
            return;
        }

        if (currentTheme === 'cards') {
            listDiv.classList.add('card-style');
            renderPhysicalCards(listDiv);
        } else {
            listDiv.classList.remove('card-style');
            renderListCards(listDiv);
        }
    }

    function renderListCards(listDiv) {
        localCards.forEach((card, i) => {
            const item = document.createElement('div');
            item.className = 'card-item';

            const icon = document.createElement('div');
            icon.className = 'card-icon';
            icon.style.background = CARD_COLORS[i % CARD_COLORS.length];
            icon.textContent = card.name.charAt(0).toUpperCase();

            const info = document.createElement('div');
            info.className = 'card-info';
            const nm  = document.createElement('strong'); nm.textContent = card.name;
            const sub = document.createElement('small');  sub.textContent = card.number;
            info.appendChild(nm); info.appendChild(sub);

            const actions = document.createElement('div');
            actions.className = 'card-actions';

            const showBtn = document.createElement('button');
            showBtn.className = 'btn-show';
            showBtn.textContent = '显示';
            showBtn.onclick = () => renderBarcode(card.name, card.number, card.format);

            const delBtn = document.createElement('button');
            delBtn.className = 'btn-delete';
            delBtn.textContent = '✕';
            delBtn.onclick = () => deleteCard(i);

            actions.appendChild(showBtn); actions.appendChild(delBtn);
            item.appendChild(icon); item.appendChild(info); item.appendChild(actions);
            listDiv.appendChild(item);
        });
    }

    function renderPhysicalCards(listDiv) {
        localCards.forEach((card, i) => {
            const el = document.createElement('div');
            el.className = 'card-physical';
            el.style.background = CARD_COLORS[i % CARD_COLORS.length];

            const top = document.createElement('div');
            top.className = 'card-physical-top';
            const nm  = document.createElement('div'); nm.className = 'card-physical-name'; nm.textContent = card.name;
            const fmt = document.createElement('div'); fmt.className = 'card-physical-fmt';  fmt.textContent = card.format;
            top.appendChild(nm); top.appendChild(fmt);

            const bot = document.createElement('div');
            bot.className = 'card-physical-bottom';
            const num = document.createElement('div'); num.className = 'card-physical-num'; num.textContent = card.number;

            const acts = document.createElement('div');
            acts.className = 'card-physical-actions';

            const showBtn = document.createElement('button');
            showBtn.className = 'btn-show-ph';
            showBtn.textContent = '显示';
            showBtn.onclick = () => renderBarcode(card.name, card.number, card.format);

            const delBtn = document.createElement('button');
            delBtn.className = 'btn-del-ph';
            delBtn.textContent = '✕';
            delBtn.onclick = () => deleteCard(i);

            acts.appendChild(showBtn); acts.appendChild(delBtn);
            bot.appendChild(num); bot.appendChild(acts);
            el.appendChild(top); el.appendChild(bot);
            listDiv.appendChild(el);
        });
    }

    /* ── Barcode ── */
    function renderBarcode(name, number, format) {
        const sec = document.getElementById('barcode-section');
        document.getElementById('display-name').textContent = name;
        sec.classList.add('show');
        try {
            JsBarcode('#barcode-canvas', number, {
                format, lineColor: '#000', width: 2.5, height: 100, displayValue: true
            });
        } catch (_) {
            toast('条码渲染失败，请检查卡号格式');
            sec.classList.remove('show'); return;
        }
        sec.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function closeBarcode() {
        restoreBrightness();
        document.getElementById('barcode-section').classList.remove('show');
    }

    /* ── Brightness ── */
    function setBrightMax() {
        prevBrightness = document.documentElement.style.filter || '';
        document.documentElement.style.filter = 'brightness(2)';
        document.getElementById('btn-bright-max').style.display     = 'none';
        document.getElementById('btn-bright-restore').style.display = 'inline-block';
    }
    function restoreBrightness() {
        if (prevBrightness !== null) {
            document.documentElement.style.filter = prevBrightness;
            prevBrightness = null;
        }
        document.getElementById('btn-bright-max').style.display     = 'inline-block';
        document.getElementById('btn-bright-restore').style.display = 'none';
    }
</script>
</body>
</html>
