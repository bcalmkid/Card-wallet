    <hr>

    <h3>云端同步 (GitHub Gist)</h3>
    <div style="background: #f0f0f0; padding: 15px; border-radius: 8px; margin-bottom: 10px;">
        <input type="password" id="ghToken" placeholder="输入 GitHub Token (ghp_...)" />
        <input type="text" id="ghGistId" placeholder="输入 Gist ID" />
        <button class="primary" onclick="saveGithubSettings()">💾 保存 GitHub 配置到本地</button>
    </div>

    <div style="display: flex; gap: 10px;">
        <button class="secondary" style="flex: 1;" onclick="uploadToGithub()">↑ 上传到云端</button>
        <button class="secondary" style="flex: 1;" onclick="downloadFromGithub()">↓ 从云端恢复</button>
    </div>

    <script>
        // ... (保留你之前的 JS 代码，例如 renderBarcode, addAndRenderCard, updateCardList) ...

        // --- GitHub 同步逻辑 ---
        const GITHUB_CONFIG_KEY = 'github_settings';

        // 页面加载时自动填入保存的配置
        function loadGithubSettings() {
            const settings = JSON.parse(localStorage.getItem(GITHUB_CONFIG_KEY) || '{}');
            if (settings.token) document.getElementById('ghToken').value = settings.token;
            if (settings.gistId) document.getElementById('ghGistId').value = settings.gistId;
        }

        function saveGithubSettings() {
            const token = document.getElementById('ghToken').value.trim();
            const gistId = document.getElementById('ghGistId').value.trim();
            localStorage.setItem(GITHUB_CONFIG_KEY, JSON.stringify({ token, gistId }));
            alert('GitHub 配置已保存在本地！');
        }

        async function uploadToGithub() {
            const settings = JSON.parse(localStorage.getItem(GITHUB_CONFIG_KEY) || '{}');
            if (!settings.token || !settings.gistId) return alert('请先填写并保存 GitHub 配置');

            const localData = localStorage.getItem(STORAGE_KEY) || '[]';

            try {
                const response = await fetch(`https://api.github.com/gists/${settings.gistId}`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `Bearer ${settings.token}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        files: {
                            'cards.json': { content: localData }
                        }
                    })
                });

                if (response.ok) {
                    alert('上传成功！数据已备份至 GitHub。');
                } else {
                    alert('上传失败，请检查 Token 或 Gist ID 是否正确。');
                }
            } catch (e) {
                alert('网络错误：' + e.message);
            }
        }

        async function downloadFromGithub() {
            const settings = JSON.parse(localStorage.getItem(GITHUB_CONFIG_KEY) || '{}');
            if (!settings.token || !settings.gistId) return alert('请先填写并保存 GitHub 配置');

            try {
                const response = await fetch(`https://api.github.com/gists/${settings.gistId}`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${settings.token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    const cloudContent = data.files['cards.json'].content;
                    
                    // 覆写本地数据并刷新
                    localStorage.setItem(STORAGE_KEY, cloudContent);
                    updateCardList();
                    alert('恢复成功！已从 GitHub 拉取最新数据。');
                } else {
                    alert('下载失败，请检查 Token 或 Gist ID 是否正确。');
                }
            } catch (e) {
                alert('网络错误：' + e.message);
            }
        }

        // 初始化
        loadGithubSettings();
        // updateCardList(); // 确保保留之前的初始化调用
    </script>
